<div class="mx-auto max-w-[1020px] grid grid-cols-12 mt-4 border-2 border-black shadow-lg shadow-green-500 rounded-2xl gap-10 relative">

    <a href="javascript:history.back()"
       class="absolute top-4 left-4 z-20 flex items-center justify-center w-10 h-10 bg-black/40 hover:bg-green-600 text-white rounded-full transition-all backdrop-blur-md border border-white/20">
        <span class="material-icons">arrow_back</span>
    </a>


    <img src="{{ product.image.url }}" alt="maxsulot surati" class="w-full h-[650px] col-span-6 rounded-2xl object-cover">


    <div class="col-span-6 flex flex-col h-[650px] pr-2">
        <form method="post" action="" class="mt-8 ml-22 flex flex-col gap-4 flex-none">
            {% csrf_token %}
           <div class="flex flex-row gap-1">
                <button type="button" id="minus-btn" class="bg-green-500 text-white text-xl py-2 px-8 rounded-lg hover:cursor-pointer hover:bg-green-600 active:bg-green-700 transition active:scale-95"><span class="material-icons">remove</span></button>
                <input name="quantity" id="quantity-input" value="1" type="text" class="max-w-[100px] text-center focus:outline-none text-blue-500 py-2 px-8 border-2 border-green-200 rounded-lg">
                <button type="button" id="plus-btn" class="bg-green-500 text-white text-xl py-2 px-8 rounded-lg hover:cursor-pointer hover:bg-green-600 active:bg-green-700 transition active:scale-95"><span class="material-icons">add</span></button>
           </div>

           <button class="max-w-72 flex flex-row gap-2 items-center justify-center bg-green-500 text-white text-xl py-2 px-8 rounded-lg hover:cursor-pointer hover:bg-green-600 active:bg-green-700 transition active:scale-95">
                SAVATGA QO'SHISH
               <span class="material-icons">shopping_cart</span>
           </button>
        </form>


        <div class="flex flex-row gap-4 ml-2 mt-6 flex-none">
           <h2 class="text-3xl text-green-500 flex justify-between w-full pr-10">
                <span>{{ product.name }}</span>
                <span>{{ product.price }}$</span>
           </h2>
        </div>


        <div class="overflow-y-auto flex-grow mt-4 mb-4 px-3">
            <p class="text-green-100">{{ product.description|linebreaksbr }}</p>
        </div>
    </div>
</div>



<script>
    // Elementlarni tanlab olamiz
    const minusBtn = document.getElementById('minus-btn');
    const plusBtn = document.getElementById('plus-btn');
    const quantityInput = document.getElementById('quantity-input');

    // Plus tugmasi bosilganda
    plusBtn.addEventListener('click', () => {
        let currentValue = parseInt(quantityInput.value);
        quantityInput.value = currentValue + 1;
    });

    // Minus tugmasi bosilganda
    minusBtn.addEventListener('click', () => {
        let currentValue = parseInt(quantityInput.value);
        // Miqdor 1 dan kamayib ketmasligi uchun tekshiruv
        if (currentValue > 1) {
            quantityInput.value = currentValue - 1;
        }
    });
</script>

{% if messages %}
    <script>
        {% for message in messages %}
            Swal.fire({
                position: "center",      // Oynani o'rtada chiqarish
                icon: "{{ message.tags }}", // success, error, info
                title: "{{ message }}",
                showConfirmButton: false, // Tasdiqlash tugmasini yashirish
                timer: 2000,             // 2000 millisekund = 2 soniya
                timerProgressBar: true,  // Pastida vaqt ketayotganini ko'rsatuvchi chiziq
                background: "#1a1a1a",   // To'q fon
                color: "#22c55e",        // Yashil matn
                iconColor: "#22c55e"     // Yashil belgi
            });
        {% endfor %}
    </script>
{% endif %}




{% endblock content %}
